<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720">
<defs>
  <radialGradient id="halo" cx="50%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow2" cx="50%" cy="70%" r="60%">
    <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="spear" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#E8CC6B" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#B8960E" stop-opacity="0.7"/>
  </linearGradient>
</defs>

<!-- Halo glow around figure -->
<ellipse cx="300" cy="290" rx="220" ry="280" fill="url(#halo)"/>
<!-- Ground glow -->
<ellipse cx="300" cy="640" rx="200" ry="80" fill="url(#glow2)"/>

<!-- Stars background -->
<g fill="#E8CC6B" opacity="0.55">
  <circle cx="28" cy="30" r="1.5"/><circle cx="72" cy="12" r="1"/>
  <circle cx="118" cy="48" r="2"/><circle cx="165" cy="18" r="1.5"/>
  <circle cx="220" cy="38" r="1"/><circle cx="280" cy="8" r="1.5"/>
  <circle cx="320" cy="22" r="1"/><circle cx="380" cy="10" r="1.5"/>
  <circle cx="435" cy="40" r="2"/><circle cx="482" cy="15" r="1"/>
  <circle cx="528" cy="35" r="1.5"/><circle cx="572" cy="8" r="1"/>
  <circle cx="45" cy="95" r="1"/><circle cx="140" cy="110" r="1.5"/>
  <circle cx="460" cy="100" r="1"/><circle cx="555" cy="90" r="1.5"/>
  <circle cx="88" cy="165" r="1"/><circle cx="512" cy="155" r="1"/>
</g>

<!-- Background columns (flanking, subtle) -->
<g opacity="0.28">
  <!-- Left column -->
  <rect x="28" y="150" width="22" height="420" fill="#94A3B8" fill-opacity="0.4"/>
  <rect x="22" y="146" width="34" height="8" fill="#94A3B8" fill-opacity="0.45"/>
  <rect x="20" y="568" width="38" height="6" fill="#94A3B8" fill-opacity="0.35"/>
  <!-- Right column -->
  <rect x="550" y="150" width="22" height="420" fill="#94A3B8" fill-opacity="0.4"/>
  <rect x="544" y="146" width="34" height="8" fill="#94A3B8" fill-opacity="0.45"/>
  <rect x="542" y="568" width="38" height="6" fill="#94A3B8" fill-opacity="0.35"/>
</g>

<!-- Arch / temple frame (background) -->
<path d="M 80,600 L 80,300 Q 80,140 300,120 Q 520,140 520,300 L 520,600"
      fill="none" stroke="#D4AF37" stroke-width="1.2" stroke-opacity="0.22"/>

<!-- Ground line -->
<line x1="60" y1="640" x2="540" y2="640" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.28"/>
<!-- Ground step -->
<rect x="100" y="640" width="400" height="8" rx="1" fill="#94A3B8" fill-opacity="0.18"/>
<rect x="80" y="648" width="440" height="6" rx="1" fill="#94A3B8" fill-opacity="0.14"/>

<!-- ===== SPEAR ===== -->
<!-- Spear shaft -->
<rect x="370" y="120" width="6" height="490" rx="3" fill="url(#spear)" fill-opacity="0.85"/>
<!-- Spear tip (triangular blade) -->
<polygon points="367,120 373,120 370,72" fill="#E8CC6B" fill-opacity="0.9"/>
<polygon points="367,122 373,122 375,140 365,140" fill="#B8960E" fill-opacity="0.6"/>
<!-- Spear butt end -->
<ellipse cx="373" cy="612" rx="4" ry="6" fill="#B8960E" fill-opacity="0.7"/>

<!-- ===== SHIELD (leaning against body) ===== -->
<!-- Shield body (round, Aspis) -->
<ellipse cx="218" cy="430" rx="78" ry="88" fill="#1E3A5F" fill-opacity="0.65" stroke="#D4AF37" stroke-width="1.8" stroke-opacity="0.5"/>
