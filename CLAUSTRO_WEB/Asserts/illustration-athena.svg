<path d="M 253,254 Q 248,265 250,280 Q 252,292 260,296 Q 254,282 256,270 Z" fill="#3A5570" fill-opacity="0.8"/>
<path d="M 347,254 Q 352,265 350,280 Q 348,292 340,296 Q 346,282 344,270 Z" fill="#3A5570" fill-opacity="0.8"/>
<!-- Nose guard (nasal) -->
<rect x="296" y="240" width="8" height="30" rx="3" fill="#3A5570" fill-opacity="0.75"/>
