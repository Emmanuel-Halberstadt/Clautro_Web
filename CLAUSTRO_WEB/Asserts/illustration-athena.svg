<line x1="278" y1="314" x2="270" y2="636" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.22"/>
<line x1="292" y1="316" x2="287" y2="636" stroke="#D4AF37" stroke-width="0.7" stroke-opacity="0.18"/>
<line x1="306" y1="316" x2="304" y2="636" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.2"/>
<line x1="320" y1="316" x2="322" y2="636" stroke="#D4AF37" stroke-width="0.7" stroke-opacity="0.18"/>
<line x1="334" y1="316" x2="338" y2="636" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.22"/>
<!-- Overfold (apoptygma) at chest -->
<path d="M 265,314 L 258,380 L 350,380 L 344,314 Z" fill="#EDD9A0" fill-opacity="0.6"/>
<line x1="272" y1="316" x2="268" y2="380" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.25"/>
<line x1="298" y1="316" x2="296" y2="380" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.25"/>
<line x1="325" y1="316" x2="328" y2="380" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.25"/>
<!-- Belt / zone -->
<rect x="260" y="378" width="92" height="8" rx="4" fill="#D4AF37" fill-opacity="0.45"/>
<!-- Belt buckle detail -->
<rect x="300" y="376" width="12" height="12" rx="2" fill="#D4AF37" fill-opacity="0.65"/>

<!-- Aegis (divine breastplate) over chest -->
<path d="M 262,318 Q 265,308 306,305 Q 348,308 350,318 L 348,378 L 264,378 Z" fill="#1E3A5F" fill-opacity="0.35" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.4"/>
<!-- Scale pattern on aegis (subtle) -->
<g stroke="#D4AF37" stroke-opacity="0.18" fill="none" stroke-width="0.6">
  <path d="M 275,325 Q 282,320 290,325 Q 282,330 275,325 Z"/>
  <path d="M 290,325 Q 297,320 305,325 Q 297,330 290,325 Z"/>
  <path d="M 305,325 Q 312,320 320,325 Q 312,330 305,325 Z"/>
  <path d="M 280,338 Q 287,333 295,338 Q 287,343 280,338 Z"/>
  <path d="M 295,338 Q 302,333 310,338 Q 302,343 295,338 Z"/>
  <path d="M 280,350 Q 287,345 295,350 Q 287,355 280,350 Z"/>
  <path d="M 295,350 Q 302,345 310,350 Q 302,355 295,350 Z"/>
</g>

<!-- Left arm (holding spear, slight extension) -->
<path d="M 341,316 C 352,322 360,336 362,365" stroke="#EDD9A0" stroke-width="16" stroke-linecap="round" fill="none" stroke-opacity="0.82"/>
<!-- Right arm (holding shield edge) -->
<path d="M 268,316 C 256,328 248,355 244,390" stroke="#EDD9A0" stroke-width="15" stroke-linecap="round" fill="none" stroke-opacity="0.78"/>

<!-- Neck -->
<rect x="293" y="264" width="14" height="24" rx="5" fill="#E8C99A" fill-opacity="0.85"/>

<!-- ===== HEAD ===== -->
<circle cx="300" cy="242" r="46" fill="#E8C99A"/>

<!-- Hair (visible below helmet, soft waves) -->
<path d="M 258,265 Q 254,278 260,290 Q 265,300 272,304" stroke="#3D5226" stroke-width="4" stroke-linecap="round" fill="none" stroke-opacity="0.75"/>
<path d="M 342,265 Q 346,278 340,290 Q 335,300 328,304" stroke="#3D5226" stroke-width="4" stroke-linecap="round" fill="none" stroke-opacity="0.75"/>

<!-- ===== CORINTHIAN HELMET ===== -->
<!-- Helmet bowl -->
<path d="M 252,252 Q 248,220 268,200 Q 282,184 300,182 Q 318,184 332,200 Q 352,220 348,252 Z" fill="#4A6B8A" fill-opacity="0.85"/>
<!-- Helmet bowl highlight -->
<path d="M 258,248 Q 255,225 272,208 Q 284,196 300,195" stroke="#94A3B8" stroke-width="1.2" fill="none" stroke-opacity="0.45"/>
