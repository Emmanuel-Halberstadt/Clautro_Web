<ellipse cx="218" cy="430" rx="20" ry="20" fill="#0F172A" fill-opacity="0.5" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.5"/>
<ellipse cx="218" cy="430" rx="12" ry="12" fill="#D4AF37" fill-opacity="0.28"/>
<!-- Shield decorative: simplified Gorgon/spiral motif -->
<g stroke="#D4AF37" stroke-opacity="0.3" fill="none" stroke-width="0.8">
  <path d="M 218,405 Q 240,412 244,430 Q 240,448 218,455 Q 196,448 192,430 Q 196,412 218,405 Z"/>
  <!-- Radiating lines -->
  <line x1="218" y1="370" x2="218" y2="385"/>
  <line x1="255" y1="382" x2="245" y2="393"/>
  <line x1="270" y1="415" x2="255" y2="418"/>
  <line x1="255" y1="478" x2="245" y2="468"/>
  <line x1="218" y1="492" x2="218" y2="476"/>
  <line x1="181" y1="478" x2="191" y2="468"/>
  <line x1="166" y1="445" x2="181" y2="442"/>
  <line x1="181" y1="382" x2="191" y2="393"/>
</g>

<!-- ===== ATHENA FIGURE ===== -->
<!-- Main robe/peplos (long flowing) -->
<path d="M 270,310 C 265,360 260,420 258,490 Q 255,550 260,638 L 356,638 Q 352,550 348,490 Q 346,420 342,360 L 340,310 Z" fill="#F0DFB8" fill-opacity="0.88"/>
