  <path d="M 276,196 Q 274,165 280,136 Q 284,115 288,95" stroke-width="4" stroke-linecap="round"/>
  <path d="M 285,193 Q 284,162 290,133 Q 294,112 296,92" stroke-width="4" stroke-linecap="round"/>
  <path d="M 300,192 Q 300,160 300,130 Q 300,108 300,88" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 315,193 Q 316,162 310,133 Q 306,112 304,92" stroke-width="4" stroke-linecap="round"/>
  <path d="M 324,196 Q 326,165 320,136 Q 316,115 312,95" stroke-width="4" stroke-linecap="round"/>
  <path d="M 332,198 Q 336,170 330,140 Q 326,120 322,100" stroke-width="4" stroke-linecap="round"/>
</g>
<!-- Plume tips glow (gold) -->
<g fill="#D4AF37" fill-opacity="0.5">
  <circle cx="275" cy="100" r="3.5"/>
  <circle cx="285" cy="92" r="3.5"/>
  <circle cx="293" cy="90" r="3.5"/>
  <circle cx="300" cy="87" r="4"/>
  <circle cx="307" cy="90" r="3.5"/>
  <circle cx="315" cy="92" r="3.5"/>
  <circle cx="325" cy="100" r="3.5"/>
</g>
<!-- Helmet decorative band -->
<line x1="252" y1="254" x2="348" y2="254" stroke="#D4AF37" stroke-width="1.2" stroke-opacity="0.4"/>
<!-- Eye visible (slight) -->
<ellipse cx="269" cy="258" rx="4.5" ry="3.5" fill="#1E293B" fill-opacity="0.55"/>
<circle cx="270" cy="258" r="1.8" fill="#0F172A"/>
<ellipse cx="331" cy="258" rx="4.5" ry="3.5" fill="#1E293B" fill-opacity="0.55"/>
<circle cx="330" cy="258" r="1.8" fill="#0F172A"/>
<!-- Helmet nose guard shadow -->
<path d="M 296,270 Q 300,276 304,270" stroke="#3A5570" stroke-width="1" fill="none" stroke-opacity="0.5"/>
<!-- Lips subtle -->
<path d="M 292,284 Q 300,289 308,284" stroke="#C4A37A" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>

<!-- ===== OWL (perched, right side) ===== -->
<g transform="translate(388,510)">
  <!-- Owl body -->
  <ellipse cx="36" cy="48" rx="26" ry="32" fill="#3D5226" fill-opacity="0.7"/>
  <!-- Owl head (round) -->
  <circle cx="36" cy="22" r="24" fill="#4A6035" fill-opacity="0.75"/>
  <!-- Facial disc (flat face) -->
  <ellipse cx="36" cy="24" rx="18" ry="16" fill="#2A3E18" fill-opacity="0.45"/>
  <!-- Eyes (large, round - owl characteristic) -->
  <circle cx="27" cy="22" r="8" fill="#0F172A" fill-opacity="0.85"/>
  <circle cx="45" cy="22" r="8" fill="#0F172A" fill-opacity="0.85"/>
  <circle cx="27" cy="22" r="5" fill="#D4AF37" fill-opacity="0.7"/>
  <circle cx="45" cy="22" r="5" fill="#D4AF37" fill-opacity="0.7"/>
  <circle cx="27" cy="22" r="2.5" fill="#0F172A"/>
  <circle cx="45" cy="22" r="2.5" fill="#0F172A"/>
  <!-- Eye gleam -->
  <circle cx="28.5" cy="20.5" r="1.2" fill="white" fill-opacity="0.7"/>
  <circle cx="46.5" cy="20.5" r="1.2" fill="white" fill-opacity="0.7"/>
  <!-- Beak -->
  <polygon points="33,29 39,29 36,35" fill="#D4AF37" fill-opacity="0.75"/>
  <!-- Ear tufts -->
  <path d="M 22,8 Q 20,2 24,0" stroke="#3D5226" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M 50,8 Q 52,2 48,0" stroke="#3D5226" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Wings (folded) -->
  <path d="M 10,52 Q 4,60 8,76 Q 16,84 28,82" stroke="#3D5226" stroke-width="8" stroke-linecap="round" fill="none" stroke-opacity="0.68"/>
  <path d="M 62,52 Q 68,60 64,76 Q 56,84 44,82" stroke="#3D5226" stroke-width="8" stroke-linecap="round" fill="none" stroke-opacity="0.68"/>
  <!-- Wing feather hint -->
  <path d="M 10,52 Q 6,62 10,72" stroke="#4A6035" stroke-width="4" stroke-linecap="round" fill="none" stroke-opacity="0.5"/>
  <path d="M 62,52 Q 66,62 62,72" stroke="#4A6035" stroke-width="4" stroke-linecap="round" fill="none" stroke-opacity="0.5"/>
  <!-- Talons/feet on branch -->
  <path d="M 24,80 Q 22,88 18,94" stroke="#3D5226" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 30,82 Q 28,90 26,96" stroke="#3D5226" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 36,82 Q 36,90 36,96" stroke="#3D5226" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 42,82 Q 44,90 46,96" stroke="#3D5226" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 48,80 Q 50,88 54,94" stroke="#3D5226" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Branch -->
  <path d="M 0,95 Q 36,90 72,95" stroke="#556B2F" stroke-width="4" stroke-linecap="round" fill="none" stroke-opacity="0.55"/>
  <!-- Olive leaves on branch -->
  <g fill="#6B8A3E" fill-opacity="0.6">
    <ellipse cx="8" cy="92" rx="6" ry="2.5" transform="rotate(-20,8,92)"/>
    <ellipse cx="62" cy="92" rx="6" ry="2.5" transform="rotate(20,62,92)"/>
  </g>
</g>

<!-- DECORATIVE: Stars in an arc around Athena -->
<g fill="#D4AF37" fill-opacity="0.4">
  <circle cx="145" cy="180" r="2.5"/>
  <circle cx="128" cy="220" r="2"/>
  <circle cx="122" cy="265" r="2.5"/>
  <circle cx="128" cy="310" r="2"/>
  <circle cx="455" cy="180" r="2.5"/>
  <circle cx="472" cy="220" r="2"/>
  <circle cx="478" cy="265" r="2.5"/>
  <circle cx="472" cy="310" r="2"/>
</g>

<!-- Connecting star lines (constellation hint) -->
<g stroke="#D4AF37" stroke-opacity="0.15" stroke-width="0.6">
  <line x1="145" y1="180" x2="128" y2="220"/>
  <line x1="128" y1="220" x2="122" y2="265"/>
  <line x1="455" y1="180" x2="472" y2="220"/>
  <line x1="472" y1="220" x2="478" y2="265"/>
</g>

<!-- Greek key border (bottom) -->
<g transform="translate(0,670)" opacity="0.25">
  <line x1="40" y1="10" x2="560" y2="10" stroke="#D4AF37" stroke-width="0.7"/>
  <!-- Meander pattern (simplified) -->
  <g fill="#D4AF37" fill-opacity="0.5">
    <polygon points="290,5 295,10 290,15 285,10"/>
    <polygon points="310,5 315,10 310,15 305,10"/>
    <polygon points="270,5 275,10 270,15 265,10"/>
    <polygon points="330,5 335,10 330,15 325,10"/>
  </g>
</g>

<!-- Radiant lines from body (subtle divine light) -->
<g stroke="#D4AF37" stroke-opacity="0.06" stroke-width="30">
  <line x1="300" y1="120" x2="80" y2="640"/>
  <line x1="300" y1="120" x2="300" y2="660"/>
  <line x1="300" y1="120" x2="520" y2="640"/>
</g>

<!-- Name omega symbol (decorative, bottom center) -->
<path d="M 280,698 Q 260,680 265,660 Q 272,642 300,642 Q 328,642 335,660 Q 340,680 320,698 L 280,698 Z M 275,698 L 268,698 M 325,698 L 332,698"
      fill="none" stroke="#D4AF37" stroke-width="1.2" stroke-opacity="0.35"/>

</svg>
